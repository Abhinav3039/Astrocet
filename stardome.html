<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardome Wing | Astro CET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(ellipse at 40% 40%, #141028 0%, #03010a 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .stardome-page {
            max-width: 800px;
            text-align: center;
        }
        h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #fff, #e9d5ff, #67e8f9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .back-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: rgba(139, 92, 246, 0.3);
            border: 1px solid #a78bfa;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #8b5cf6;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="stardome-page">
        <h1>🌠 Stardome Wing</h1>
        <p style="font-size: 1.5rem; margin-bottom: 2rem;">Stargazing · Celestial Events · Constellations</p>
        <p style="opacity: 0.8;">This is the Stardome Wing page. Add your content here!</p>
        <a href="index.html" class="back-btn">← Back to Astro CET</a>
    </div>
</body>
</html>
